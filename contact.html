<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:white;
}

/* VIDEO */
#bg-video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  top:0;
  left:0;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* FORM */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

form{
  background:rgba(0,0,0,0.6);
  padding:40px;
  border-radius:20px;
  width:320px;
  backdrop-filter:blur(10px);
  text-align:center;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  padding:12px;
  width:100%;
  background:#00ffd5;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #00ffd5;
}

button:hover{
  box-shadow:0 0 40px #00ffd5;
}

</style>
</head>

<body>

<!-- 🎬 فيديو الكونتكت -->
<video autoplay muted loop id="bg-video">
  <source src="video.mp4/contact.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
  <!-- ⚠️ بدل ID هنا -->
  <form action="https://formspree.io/f/yourID" method="POST">
    <h2>Contact Me</h2>

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>

</body>
</html>
